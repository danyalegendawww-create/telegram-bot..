services:
  - type: worker
    name: telegram-shop-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_PATH
        value: /data/shop.db
    plan: free
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
